<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Login – ScienceB3</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Teacher accent override */
    :root { --accent:#7D3C98; --accent-dark:#6C3483; }
    .btn-primary-custom           { background: var(--accent) !important; }
    .btn-primary-custom:hover     { background: var(--accent-dark) !important; box-shadow:0 6px 20px rgba(125,60,152,0.4) !important; }
    .form-control-custom:focus    { border-color: var(--accent); box-shadow:0 0 0 3px rgba(125,60,152,0.12); }
    .auth-logo-icon               { background: var(--accent) !important; }
    .demo-creds-box               { background: linear-gradient(135deg,#F5EEF8,#F0EAF6); }
    .demo-creds-box .demo-title   { color: var(--accent); }
    .demo-creds-box code          { color: var(--accent); border-color: rgba(125,60,152,0.2); }
  </style>
</head>
<body class="auth-page">

  <div class="auth-wrapper">
    <div class="auth-card">

      <a href="index.html" class="auth-logo">
        <span class="auth-logo-icon" style="background:var(--accent);">&#128300;</span>
        <span class="auth-logo-text">ScienceB3</span>
      </a>

      <span class="auth-role-badge">Teacher Portal</span>
      <h1>Welcome back</h1>
      <p class="auth-sub">Sign in to manage courses, quizzes, and student progress.</p>

      <!-- Demo credentials hint -->
      <div class="demo-creds-box">
        <div class="demo-title">&#x1F511; Demo Login</div>
        <div class="demo-row">
          <span>ID:</span>
          <code>TCH-2024-007</code>
          <span style="color:var(--gray-400);">or</span>
          <code>teacher</code>
        </div>
        <div class="demo-row">
          <span>Password:</span>
          <code>teacher123</code>
        </div>
      </div>

      <form id="teacherLoginForm" novalidate>

        <div class="form-group">
          <label for="staffId">Staff ID or Email Address</label>
          <div class="input-icon-wrap">
            <i class="bi bi-person input-icon"></i>
            <input
              type="text"
              id="staffId"
              class="form-control-custom"
              placeholder="e.g. TCH-2024-007 or you@school.edu"
              autocomplete="username"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label for="password">
            Password
            <a href="#" style="float:right;font-size:0.78rem;color:var(--accent);text-decoration:none;font-weight:500;">Forgot password?</a>
          </label>
          <div class="input-icon-wrap" style="position:relative;">
            <i class="bi bi-lock input-icon"></i>
            <input
              type="password"
              id="password"
              class="form-control-custom"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
              style="padding-right:44px;"
            />
            <button
              type="button"
              onclick="togglePwd('password','eyeT')"
              style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gray-400);"
            >
              <i class="bi bi-eye" id="eyeT"></i>
            </button>
          </div>
        </div>

        <div class="d-flex align-items-center justify-content-between mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe" />
            <label class="form-check-label" for="rememberMe" style="font-size:0.85rem;color:var(--text-muted);">Keep me signed in</label>
          </div>
        </div>

        <div
          id="loginError"
          class="mb-3"
          style="display:none;background:rgba(192,57,43,0.08);border:1.5px solid var(--danger);border-radius:8px;padding:10px 14px;font-size:0.875rem;color:var(--danger);"
        >
          <i class="bi bi-exclamation-circle me-2"></i>
          <span id="loginErrorMsg">Invalid credentials. Please try again.</span>
        </div>

        <button type="submit" class="btn-primary-custom btn-full">
          <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>

      </form>

      <div class="auth-divider">or</div>

      <div style="text-align:center;">
        <a href="student-login.html" style="font-size:0.875rem;color:var(--text-muted);text-decoration:none;">
          Are you a student? <span style="color:var(--accent);font-weight:700;">Student login</span>
        </a>
      </div>

      <div class="auth-footer-link" style="margin-top:16px;">
        <a href="index.html"><i class="bi bi-arrow-left me-1"></i>Back to main site</a>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="auth.js"></script>
  <script>
    // Seed demo accounts then redirect if already logged in
    Auth.seedDefaultUsers().then(() => Auth.redirectIfLoggedIn('teacher-portal.html'));

    function togglePwd(inputId, iconId) {
      const inp = document.getElementById(inputId);
      const ico = document.getElementById(iconId);
      if (inp.type === 'password') { inp.type = 'text'; ico.className = 'bi bi-eye-slash'; }
      else { inp.type = 'password'; ico.className = 'bi bi-eye'; }
    }

    const form      = document.getElementById('teacherLoginForm');
    const errBox    = document.getElementById('loginError');
    const errMsg    = document.getElementById('loginErrorMsg');
    const submitBtn = form.querySelector('button[type="submit"]');

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      errBox.style.display = 'none';

      const id = document.getElementById('staffId').value.trim();
      const pw = document.getElementById('password').value;

      if (!id || !pw) {
        errMsg.textContent = 'Please enter your Staff ID/email and password.';
        errBox.style.display = 'block';
        return;
      }

      Auth.setButtonLoading(submitBtn, true);
      const result = await Auth.login(id, pw, 'teacher');
      Auth.setButtonLoading(submitBtn, false);

      if (result.ok) {
        window.location.href = 'teacher-portal.html';
      } else {
        errMsg.textContent = result.error;
        errBox.style.display = 'block';
      }
    });
  </script>
</body>
</html>
